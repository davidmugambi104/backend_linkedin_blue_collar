version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: workforge-db-dev
    environment:
      POSTGRES_USER: workforge
      POSTGRES_PASSWORD: workforge
      POSTGRES_DB: workforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: workforge-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workforge-api-dev
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://workforge:workforge@postgres:5432/workforge
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key
      - JWT_SECRET_KEY=dev-jwt-secret
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: >
      sh -c "flask db upgrade || true &&
             gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 'app:create_app()'"

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./workforge-frontend
      dockerfile: Dockerfile.dev
    container_name: workforge-frontend-dev
    environment:
      - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5173:5173"
    volumes:
      - ./workforge-frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  uploads:
