version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://workforge:workforge@postgres:5432/workforge
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - MPESA_ENV=sandbox
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - workforge-network
    command: gunicorn -w 4 -b 0.0.0.0:5000 "app:create_app()"

  # Frontend
  frontend:
    build:
      context: ./workforge-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_WS_URL=ws://localhost:5000
    volumes:
      - ./workforge-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - workforge-network
    command: npm run dev

  # Frontend Production
  frontend-prod:
    build:
      context: ./workforge-frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - workforge-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=workforge
      - POSTGRES_PASSWORD=workforge
      - POSTGRES_DB=workforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - workforge-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - workforge-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend-prod
    networks:
      - workforge-network

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  workforge-network:
    driver: bridge
